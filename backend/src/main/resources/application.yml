spring:
  application:
    name: voicecal-agent
  profiles:
    active: h2
  jpa:
    open-in-view: false

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

voicecal:
  ai:
    qwen:
      base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${DASHSCOPE_API_KEY:sk-156019214eac4e99909086462735e492}
      model-name: ${QWEN_MODEL_NAME:qwen3.6-flash}
      temperature: ${QWEN_TEMPERATURE:0.2}
      timeout-seconds: ${QWEN_TIMEOUT_SECONDS:60}
      max-retries: ${QWEN_MAX_RETRIES:1}
    speech:
      base-url: ${QWEN_ASR_BASE_URL:${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}}
      api-key: ${DASHSCOPE_API_KEY:sk-156019214eac4e99909086462735e492}
      model-name: ${QWEN_ASR_MODEL:${QWEN_ASR_MODEL_NAME:qwen3-asr-flash}}
      timeout-seconds: ${QWEN_ASR_TIMEOUT_SECONDS:60}
      max-audio-bytes: ${QWEN_ASR_MAX_AUDIO_BYTES:10485760}
