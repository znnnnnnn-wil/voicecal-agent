spring:
  application:
    name: voicecal-agent
  profiles:
    active: h2
  jpa:
    open-in-view: false

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

voicecal:
  ai:
    qwen:
      base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${DASHSCOPE_API_KEY:}
      model-name: ${QWEN_MODEL_NAME:qwen3.7-max}
      temperature: ${QWEN_TEMPERATURE:0.2}
      timeout-seconds: ${QWEN_TIMEOUT_SECONDS:60}
      max-retries: ${QWEN_MAX_RETRIES:1}
