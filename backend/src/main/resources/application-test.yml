server:
  port: ${TEST_SERVER_PORT:8080}

spring:
  datasource:
    url: ${TEST_MYSQL_URL:jdbc:mysql://localhost:3306/voicecal_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${TEST_MYSQL_USERNAME:root}
    password: ${TEST_MYSQL_PASSWORD:root}
    hikari:
      pool-name: VoiceCalTestHikariPool
      maximum-pool-size: 6
      minimum-idle: 2
      connection-timeout: 10000
      validation-timeout: 3000
      max-lifetime: 1800000
      idle-timeout: 600000
      keepalive-time: 30000
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    com.voicecal: DEBUG
